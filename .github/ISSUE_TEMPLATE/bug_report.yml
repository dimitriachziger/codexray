name: Bug report
description: Report a reproducible Codexray problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not attach unredacted Codex rollout files or report vulnerabilities here.
  - type: input
    id: version
    attributes:
      label: Codexray version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.x or 24.x
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Use synthetic, minimized data only.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Paste doctor output after checking it contains no sensitive data.
